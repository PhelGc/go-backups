version: "1"

jobs:
  # --- Local backup: fast zstd, daily at 02:00 ---
  - name: prod-db-local
    schedule: "0 2 * * *"          # minute hour day month weekday (standard 5-field cron)

    database:
      host: 127.0.0.1
      port: 3306
      user: backup_user
      password: "${MYSQL_BACKUP_PASSWORD}"   # expanded from environment variable
      database: production
      # flags:                               # optional extra mysqldump flags
      #   - "--no-tablespaces"               # required if user lacks PROCESS privilege

    compression:
      kind: zstd      # "gzip" or "zstd"
      level: 3        # zstd: 1=fastest, 3=default, 7=better, 9+=best

    storage:
      kind: local
      local:
        path: /var/backups/mysql            # directory must be writable

    notify:
      webhook_url: https://hooks.example.com/backup-notify
      headers:
        Authorization: "Bearer ${NOTIFY_TOKEN}"

    retry:
      max_attempts: 3
      delay_seconds: 30   # base delay; actual delay = 30 * 2^(attempt-1)

  # --- Remote DB, gzip, HTTP multipart upload, weekly on Saturday ---
  - name: staging-upload
    schedule: "0 4 * * 6"          # every Saturday at 04:00

    database:
      host: db.staging.internal
      port: 3306
      user: backup_user
      password: "${STAGING_DB_PASSWORD}"
      database: staging
      flags:
        - "--no-tablespaces"        # required if backup user lacks PROCESS privilege

    compression:
      kind: gzip
      level: 6          # gzip: 1=fastest, 6=default, 9=best

    storage:
      kind: http
      http:
        url: https://storage.example.com/api/v1/backups/upload
        field_name: backup_file             # multipart form field name
        timeout_seconds: 3600              # 1 hour; large databases need generous timeouts
        headers:
          X-Api-Key: "${STORAGE_API_KEY}"

    notify:
      webhook_url: https://hooks.example.com/backup-notify
      headers:
        Authorization: "Bearer ${NOTIFY_TOKEN}"

    retry:
      max_attempts: 5
      delay_seconds: 60

  # --- Manual-only (no schedule): trigger with 'gobackups run --job manual-snapshot' ---
  - name: manual-snapshot
    schedule: ""                    # empty = not scheduled, only runs via 'run' command

    database:
      host: 127.0.0.1
      port: 3306
      user: root
      password: "${ROOT_DB_PASSWORD}"
      database: critical_data

    compression:
      kind: zstd
      level: 1                      # fastest: good for large interactive backups

    storage:
      kind: local
      local:
        path: /tmp/snapshots

    retry:
      max_attempts: 1
      delay_seconds: 0
